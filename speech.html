<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Voice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;display:flex;align-items:center;justify-content:center;height:100vh}
.c{text-align:center;padding:20px;max-width:400px}
h2{font-size:1.2em;margin-bottom:8px}
#t{font-size:1.1em;color:#00e676;min-height:1.8em;margin:8px 0;word-break:break-all}
#s{font-size:.65em;color:#888;margin:4px 0}
#info{font-size:.6em;color:#555;margin-top:6px}
button{background:#e94560;color:#fff;border:none;padding:10px 20px;font-size:.9em;border-radius:8px;cursor:pointer}
button.on{background:#0f3460}
</style></head><body>
<div class="c">
<h2>🎤 语音 → Claude</h2><div id="t"></div><div id="s">就绪</div><div id="info">加载中...</div>
<button id="b" onclick="toggle()">🎤 开始监听</button>
</div>
<script>
fetch('/status').then(r=>r.json()).then(j=>{document.getElementById('info').textContent='→ '+j.target+' ('+j.count+'个)'}).catch(()=>{});
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let r=null,g=false;

function toggle(){g?stop():start()}

async function start(){
  if(!SR)return;
  try{await navigator.mediaDevices.getUserMedia({audio:true})}catch(e){document.getElementById('s').textContent='❌ 麦克风';return}
  r=new SR();r.lang='zh-CN';r.continuous=false;r.interimResults=true;
  r.onresult=e=>{
    let t='';for(let j=0;j<e.results.length;j++)t+=e.results[j][0].transcript;
    document.getElementById('t').textContent=t;
    if(t){send(t);stop()}
  };
  r.onerror=e=>{document.getElementById('s').textContent='⚠ '+e.error;stop()}
  r.onend=()=>{stop()}
  r.start();g=true;
  document.getElementById('b').textContent='⏹ 停止';document.getElementById('b').className='on';
  document.getElementById('s').textContent='🎤 听...'
}
function stop(){g=false;if(r){try{r.stop()}catch(_){}r=null}document.getElementById('b').textContent='🎤 开始监听';document.getElementById('b').className=''}
function send(txt){
  document.getElementById('s').textContent='📤 '+txt.slice(0,25);
  fetch('http://127.0.0.1:9877/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt})})
  .then(r=>r.json()).then(j=>{document.getElementById('info').textContent='✅ → '+(j.target||'?');document.getElementById('s').textContent='✓ 已发送'})
  .catch(e=>{document.getElementById('s').textContent='❌ '+e.message})
}
</script></body></html>
